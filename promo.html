<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春季限定優惠 | tripool 旅步專屬包車旅遊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* 全局精確數值設定 */
        :root {
            --padding-64: 64px;
            --header-height: 160px;
            --tripool-green: #00B4A4;
            --tripool-yellow: #F5A623;
            --pink-badge: #FF7A90;
        }

        html { scroll-behavior: smooth; overflow-x: hidden; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #ffffff; margin: 0; }

        /* 1. 幻燈片單向動畫設定 */
        .slide { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 1.5s ease-in-out; }
        
        @keyframes panLeft { from { transform: scale(1.1) translateX(2%); } to { transform: scale(1.1) translateX(-2%); } }
        @keyframes panUp { from { transform: scale(1.1) translateY(2%); } to { transform: scale(1.1) translateY(-2%); } }
        @keyframes panRight { from { transform: scale(1.1) translateX(-2%); } to { transform: scale(1.1) translateX(2%); } }
        @keyframes zoomIn { from { transform: scale(1); } to { transform: scale(1.2); } }
        @keyframes panDown { from { transform: scale(1.1) translateY(-2%); } to { transform: scale(1.1) translateY(2%); } }

        .slide-1 { animation: panLeft 8s linear infinite; }
        .slide-2 { animation: panUp 8s linear infinite; }
        .slide-3 { animation: panRight 8s linear infinite; }
        .slide-4 { animation: zoomIn 8s linear infinite; }
        .slide-5 { animation: panDown 8s linear infinite; }

        /* 2. 主標題精確設定 (84pt, 96pt, 200字距) */
        .hero-title {
            font-size: 84pt;
            line-height: 96pt;
            letter-spacing: 0.2em;
            font-weight: 700;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
            margin: 0;
            position: absolute;
            bottom: var(--padding-64);
            left: var(--padding-64);
            z-index: 20;
        }

        /* 3. 黃色鋸齒緞帶 (Fixed 固定於最上層) */
        .promo-flag {
            position: fixed;
            top: 160px; /* 從 Header 下方開始 */
            right: 0;
            background-color: var(--tripool-yellow);
            color: white;
            padding: 24px 32px 24px 60px;
            z-index: 100;
            display: flex;
            align-items: center;
            box-shadow: -5px 10px 30px rgba(0,0,0,0.2);
            /* 鋸齒形狀裁切 */
            clip-path: polygon(40px 0%, 100% 0%, 100% 100%, 40px 100%, 0% 50%);
        }

        @keyframes carBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .flag-car { font-size: 48px; animation: carBounce 2s ease-in-out infinite; margin-left: 16px; }

        /* 4. 左下角三角形 CSS 裝飾 */
        .triangle-box {
            position: absolute;
            bottom: 32px;
            left: 32px;
            display: flex;
            gap: 10px;
        }
        .css-triangle {
            width: 30px;
            height: 30px;
            background-color: white;
            opacity: 0.3;
            clip-path: polygon(100% 0, 0% 100%, 100% 100%);
        }
    </style>
</head>
<body class="antialiased">

    <header class="w-full bg-white h-[160px] flex items-center">
        <div class="max-w-[1440px] mx-auto px-[64px] flex justify-between items-center w-full">
            <div class="flex items-center gap-6">
                <h2 class="text-[36px] font-black text-tripool tracking-widest leading-none">
                    輕鬆旅行 <span class="text-tripool-yellow font-light">✕</span> 美好時光
                </h2>
                <span class="bg-pinkBadge text-white px-5 py-1.5 rounded-full text-[14px] font-bold tracking-widest shadow-sm">
                    春季包車旅遊限定優惠
                </span>
            </div>
            <div class="text-[42px] font-black text-tripool tracking-tighter w-[200px] text-right">Tripool</div>
        </div>
    </header>

    <section class="max-w-[1440px] mx-auto px-[64px] pt-4 relative">
        
        <div class="relative w-full aspect-[21/9] rounded-[64px] overflow-hidden shadow-2xl bg-gray-100">
            
            <div id="slider" class="absolute inset-0 w-full h-full">
                <img src="girlcamp.jpg" class="slide slide-1 opacity-100">
                <img src="citygirl.jpg" class="slide slide-2 opacity-0">
                <img src="seagirl.jpg" class="slide slide-3 opacity-0">
                <img src="girl.jpg" class="slide slide-4 opacity-0">
                <img src="car.jpg" class="slide slide-5 opacity-0">
            </div>

            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent z-10"></div>

            <h1 class="hero-title">專屬包車旅遊<br>享受美好時光</h1>

        </div>

        <div class="mt-4 flex items-center text-gray-400 font-bold tracking-[0.2em] text-[18px]">
            <span class="text-tripool-yellow mr-2">▶▶</span> Travel Freely, Collect Moments.
        </div>
    </section>

    <a href="#booking" class="promo-flag">
        <div class="text-right font-black text-[20px] leading-tight tracking-widest">
            立刻前往<br>領取優惠
        </div>
        <i class="ph-fill ph-car-profile flag-car"></i>
    </a>

    <section id="booking" class="py-32 bg-gray-50">
        <div class="max-w-[700px] mx-auto bg-white p-[48px] rounded-[48px] shadow-xl">
            <h3 class="text-[32px] font-black text-dark mb-10 border-b border-gray-100 pb-6">優惠領取說明</h3>
            <div class="space-y-10">
                <div class="flex items-start">
                    <i class="ph-bold ph-calendar text-tripool text-3xl mr-6"></i>
                    <div>
                        <h4 class="font-bold text-xl mb-2">活動期間</h4>
                        <p class="text-gray-500 text-lg">即日起至 2024 年 4 月 30 日止。</p>
                    </div>
                </div>
                <div class="flex items-start">
                    <i class="ph-bold ph-tag text-tripool-yellow text-3xl mr-6"></i>
                    <div>
                        <h4 class="font-bold text-xl mb-2">85折 預訂優惠</h4>
                        <p class="text-gray-500 text-lg">於官網試算系統預訂「包車旅遊」服務，結帳即享優惠折扣。</p>
                    </div>
                </div>
            </div>
            <div class="mt-12">
                <a href="https://www.tripool.app/" target="_blank" class="block w-full bg-dark text-white text-center font-bold text-2xl py-6 rounded-2xl hover:bg-black transition-all">
                    立即開始試算與預訂
                </a>
            </div>
        </div>
    </section>

    <footer class="bg-dark py-24 text-center relative overflow-hidden">
        <div class="triangle-box">
            <div class="css-triangle"></div>
            <div class="css-triangle"></div>
            <div class="css-triangle"></div>
        </div>
        <span class="text-[40px] font-black text-white tracking-tighter">Tripool</span>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            let current = 0;
            setInterval(() => {
                slides[current].style.opacity = 0;
                current = (current + 1) % slides.length;
                slides[current].style.opacity = 1;
            }, 5000);
        });
    </script>
</body>
</html>
