<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春季限定優惠 | tripool 旅步專屬包車旅遊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --p-64: 64px;
            --header-h: 160px;
            --tripool-green: #00B4A4;
            --tripool-yellow: #F5A623;
            --pink-badge: #FF7A90;
        }

        html { scroll-behavior: smooth; overflow-x: hidden; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FAFAFA; margin: 0; }

        /* 1. 徹底解決圖片「彈回/往下掉」的問題
           解法：將單向移動動畫時間拉長到 20 秒，而圖片每 5 秒就會淡出切換。
           這樣圖片在肉眼可見的時候，永遠只會朝同一個方向穩定移動，絕對不會重置縮回。
        */
        .slide { 
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; 
            opacity: 0; transition: opacity 1.5s ease-in-out; 
        }
        
        @keyframes panLeft  { 0% { transform: scale(1.15) translateX(3%); } 100% { transform: scale(1.15) translateX(-3%); } }
        @keyframes panUp    { 0% { transform: scale(1.15) translateY(3%); } 100% { transform: scale(1.15) translateY(-3%); } }
        @keyframes panRight { 0% { transform: scale(1.15) translateX(-3%); } 100% { transform: scale(1.15) translateX(3%); } }
        @keyframes zoomOut  { 0% { transform: scale(1.25); } 100% { transform: scale(1.05); } }
        @keyframes panDown  { 0% { transform: scale(1.15) translateY(-3%); } 100% { transform: scale(1.15) translateY(3%); } }

        .anim-1 { animation: panLeft 20s linear infinite; }
        .anim-2 { animation: panUp 20s linear infinite; }
        .anim-3 { animation: zoomOut 20s linear infinite; }
        .anim-4 { animation: panRight 20s linear infinite; }
        .anim-5 { animation: panDown 20s linear infinite; }

        /* 2. 主標題文字排版 
           84pt 在網頁上精確等於 112px。字距 200 等於 0.2em。
        */
        .hero-title {
            font-size: 112px;
            line-height: 128px;
            letter-spacing: 0.2em;
            font-weight: 700;
            color: white;
            text-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 2px 4px rgba(0,0,0,0.8);
            position: absolute;
            bottom: var(--p-64);
            left: var(--p-64);
            z-index: 20;
            margin: 0;
        }

        /* 3. 固定於畫面的鋸齒緞帶 (對應 flag.png) 
           Fixed 固定在右上方，使用多點 clip-path 模擬不規則鋸齒。
        */
        .promo-flag {
            position: fixed;
            top: 200px;
            right: 0;
            background-color: var(--tripool-yellow);
            color: white;
            padding: 24px 40px 24px 50px;
            z-index: 9999;
            display: flex;
            align-items: center;
            /* 模擬鋸齒邊緣 */
            clip-path: polygon(15px 0%, 100% 0%, 100% 100%, 15px 100%, 0% 90%, 15px 80%, 0% 70%, 15px 60%, 0% 50%, 15px 40%, 0% 30%, 15px 20%, 0% 10%);
            filter: drop-shadow(-5px 10px 15px rgba(0,0,0,0.3));
        }

        @keyframes carBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .flag-car { font-size: 48px; animation: carBounce 2s ease-in-out infinite; margin-left: 20px; }

        /* 4. 左下角三個三角形 CSS 裝飾 (對應 triangle.png) 
        */
        .triangle-container {
            display: flex;
            gap: 12px;
            position: absolute;
            bottom: 48px;
            left: var(--p-64);
            opacity: 0.5;
        }
        .tri {
            width: 0; height: 0;
            border-style: solid;
            border-width: 0 0 32px 32px;
            border-color: transparent transparent #ffffff transparent;
        }

        /* 手機版保護 (避免 112px 大字把手機螢幕撐破) */
        @media (max-width: 1024px) {
            .hero-title { font-size: 56px; line-height: 72px; left: 32px; bottom: 32px; }
            :root { --p-64: 32px; --header-h: 120px; }
            .promo-flag { top: 140px; transform: scale(0.8); transform-origin: right; }
        }
    </style>
</head>
<body class="antialiased">

    <header class="w-full bg-white h-[var(--header-h)] flex items-center border-b border-gray-100 shadow-sm relative z-50">
        <div class="max-w-[1440px] mx-auto px-[var(--p-64)] flex justify-between items-center w-full">
            <div class="flex items-center gap-6">
                <h2 class="text-[36px] font-black text-tripool tracking-widest leading-none">
                    輕鬆旅行 <span class="text-tripool-yellow font-light mx-1">✕</span> 美好時光
                </h2>
                <span class="bg-pinkBadge text-white px-5 py-2 rounded-full text-[13px] font-bold tracking-[0.2em] shadow-md uppercase hidden md:inline-block">
                    Spring Promo
                </span>
            </div>
            <div class="text-[40px] font-black text-tripool tracking-tighter w-[200px] text-right">Tripool</div>
        </div>
    </header>

    <main class="max-w-[1440px] mx-auto px-[var(--p-64)] pt-8 relative z-30">
        
        <div class="relative w-full aspect-[21/9] rounded-[64px] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.15)] bg-gray-200">
            
            <div id="slider" class="absolute inset-0 w-full h-full">
                <img src="girlcamp.jpg" class="slide anim-1" alt="露營">
                <img src="citygirl.jpg" class="slide anim-2" alt="城市">
                <img src="seagirl.jpg"  class="slide anim-3" alt="海邊">
                <img src="girl.jpg"     class="slide anim-4" alt="女孩">
                <img src="car.jpg"      class="slide anim-5" alt="車子">
            </div>

            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent z-10 pointer-events-none"></div>

            <h1 class="hero-title">專屬包車旅遊<br>享受美好時光</h1>
        </div>

        <div class="mt-6 flex items-center text-gray-400 font-bold tracking-[0.2em] text-[18px]">
            <span class="text-tripool-yellow mr-2">▶▶</span> Travel Freely, Collect Moments.
        </div>
    </main>

    <a href="#booking" class="promo-flag hover:bg-[#de941c] transition-colors cursor-pointer">
        <div class="text-right font-black text-[22px] leading-tight tracking-widest drop-shadow-sm">
            立刻前往<br>領取優惠
        </div>
        <i class="ph-fill ph-car-profile flag-car"></i>
    </a>

    <section id="booking" class="py-32 relative">
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-gray-50 z-0"></div>

        <div class="max-w-[1440px] mx-auto px-[var(--p-64)] relative z-10">
            <div class="text-center mb-16">
                <h2 class="text-5xl font-black text-dark mb-6">旅行，本該如此輕鬆</h2>
                <p class="text-xl text-gray-500 leading-relaxed font-medium max-w-4xl mx-auto">
                    不再煩惱交通轉乘，沒有大眾運輸的時間壓力。tripool 旅步為您提供乾淨舒適的專屬車輛與專業司機，依據您的節奏客製化行程。
                </p>
            </div>
            
            <div class="max-w-[800px] mx-auto bg-white p-16 rounded-[48px] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] border border-gray-100 relative overflow-hidden">
                <i class="ph-fill ph-ticket absolute -bottom-12 -right-12 text-[240px] text-gray-50 -rotate-12 pointer-events-none"></i>

                <h3 class="text-3xl font-black text-dark mb-10 flex items-center relative z-10 border-b border-gray-100 pb-6">
                    <span class="w-2.5 h-10 bg-tripool mr-5 rounded-full"></span>
                    優惠領取說明
                </h3>
                
                <div class="space-y-10 relative z-10">
                    <div class="flex items-start group">
                        <div class="w-14 h-14 bg-tripool/10 rounded-2xl flex-shrink-0 flex items-center justify-center mr-6 group-hover:scale-110 group-hover:bg-tripool transition-all duration-300">
                            <i class="ph-bold ph-calendar text-tripool text-2xl group-hover:text-white transition-colors"></i>
                        </div>
                        <div class="pt-1">
                            <h4 class="font-bold text-dark text-2xl mb-2">活動期間</h4>
                            <p class="text-gray-500 text-lg font-medium">即日起至 2024 年 4 月 30 日止。</p>
                        </div>
                    </div>
                    <div class="flex items-start group">
                        <div class="w-14 h-14 bg-tripool-yellow/20 rounded-2xl flex-shrink-0 flex items-center justify-center mr-6 group-hover:scale-110 group-hover:bg-tripool-yellow transition-all duration-300">
                            <i class="ph-bold ph-tag text-tripool-yellow text-2xl group-hover:text-white transition-colors"></i>
                        </div>
                        <div class="pt-1">
                            <h4 class="font-bold text-dark text-2xl mb-2">85折 預訂優惠</h4>
                            <p class="text-gray-500 text-lg font-medium">於官網試算系統預訂「包車旅遊」服務，結帳即享優惠折扣。</p>
                        </div>
                    </div>
                    <div class="flex items-start group">
                        <div class="w-14 h-14 bg-pinkBadge/15 rounded-2xl flex-shrink-0 flex items-center justify-center mr-6 group-hover:scale-110 group-hover:bg-pinkBadge transition-all duration-300">
                            <i class="ph-bold ph-gift text-pinkBadge text-2xl group-hover:text-white transition-colors"></i>
                        </div>
                        <div class="pt-1">
                            <h4 class="font-bold text-dark text-2xl mb-2">百元乘車金加碼送</h4>
                            <p class="text-gray-500 text-lg font-medium">行程完成後，NT$100 優惠券將自動派發至您的會員中心。</p>
                        </div>
                    </div>
                </div>

                <div class="mt-14 text-center relative z-10">
                    <a href="https://www.tripool.app/car-rental-with-driver" target="_blank" class="inline-block w-full bg-dark text-white text-center font-bold text-2xl py-6 rounded-2xl hover:bg-gray-800 transition-all shadow-xl hover:-translate-y-1 transform tracking-wider">
                        立即試算與預訂 <i class="ph-bold ph-arrow-right ml-2"></i>
                    </a>
                </div>
            </div>
        </div>
    </section>
